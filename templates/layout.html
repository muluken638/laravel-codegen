<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laravel Code Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8f9fa; }
        pre { background: #212529; color: #f8f9fa; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .sidebar { background: #343a40; color: #fff; min-height: 100vh; width: 20%; }
        .sidebar h5 { color: #ffc107;padding-top: 2rem; }
        .sidebar a { color: #fff; display: block; margin: 10px 0; text-decoration: none; padding-left: 1rem;}
        .sidebar a:hover { text-decoration: underline; }
        .main-content { padding:1rem; }
        .tab-btn { margin-right: 10px; margin-bottom: 10px; }
        .copy-btn { cursor: pointer; margin-left: 5px; }
        .tab-content { background: #fff; padding: 20px; border-radius: 10px; min-height: 400px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Laravel CodeGen</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
        data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="#" onclick="showTab('guide'); return false;">Guide</a></li>
        </ul>
    </div>
  </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar with databases -->
        <div class="col-md-3 sidebar">
            <h5>Databases</h5>
            {% for db in databases %}
                <a href="/tables/{{ db[0] }}">{{ db[1] | replace('_',' ') | title }}</a>
            {% endfor %}
        </div>

        <!-- Main content -->
        <div class="col-md-9 main-content">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>

<script>
function showTab(id) {
    let tabs = ['migration', 'model', 'controller', 'route', 'guide'];
    tabs.forEach(t => {
        let el = document.getElementById(t);
        if(el) el.style.display='none';
    });
    let target = document.getElementById(id);
    if(target) target.style.display='block';
}

function copyCode(id) {
    let code = document.getElementById(id).innerText;
    navigator.clipboard.writeText(code).then(() => {
        alert("Copied!");
    });
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
